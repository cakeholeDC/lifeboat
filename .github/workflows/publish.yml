name: Publish Image

on:
  pull_request_target:
    branches:
      - main
    types:
      - closed
  push:
    tags:
      - "v*"

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: version-${{ github.event.pull_request.base.ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  release-please:
    if: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.merged == true && !startsWith(github.event.pull_request.head.ref, 'release-please--branches--main') }}
    runs-on: ubuntu-latest
    steps:
      - name: Create or update version PR
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main
          skip-github-release: true

  tag:
    if: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release-please--branches--main') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out the merged version PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}

      - name: Create and push Docker version tag
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail

          release_title_pattern='^chore(\([^)]*\))?:[[:space:]]release[[:space:]]([0-9]+\.[0-9]+\.[0-9]+)$'
          if [[ "$PR_TITLE" =~ $release_title_pattern ]]; then
            version="${BASH_REMATCH[2]}"
          else
            echo "Unable to extract a SemVer version from release PR title: $PR_TITLE" >&2
            exit 1
          fi

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag --annotate "v${version}" "$MERGE_SHA" --message "Docker image v${version}"
          git push origin "v${version}"

  build-and-push:
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
