name: Conventional Commit

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - edited
      - synchronize

permissions:
  pull-requests: read

jobs:
  conventional-commit:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Check Conventional Commit title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
          scopes: | # allowed scopes
            main
            docs
            test
            build
            core
            ci
          disallowScopes: |
            release
            [A-Z]+
          requireScope: true 
